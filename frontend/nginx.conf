# Nginx config for the production SPA bundle.
# Listens on 5173 to match the Vite dev port (avoids changing docker-compose).
#
# API requests use same-origin /api → proxied to Spring Cloud Gateway inside Docker.
# That avoids browser calls to localhost:8000 (CORS / timing / port confusion).
server {
    listen       5173;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Proxy REST calls to API Gateway (must be before SPA fallback)
    location /api {
        proxy_pass http://api-gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }

    # Long-cache hashed asset files
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for client-side routing.
    # The HTML shell must NEVER be cached — back/forward navigations and
    # bfcache restores would otherwise show stale post-login UI after logout.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, private";
        add_header Pragma "no-cache";
    }

    # Explicit no-store on the HTML entry point (covers bfcache too).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private";
        add_header Pragma "no-cache";
        expires off;
    }

    # gzip text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
