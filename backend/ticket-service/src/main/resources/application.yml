spring:
  application:
    name: ticket-service

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:mysql://mysql:3306/ticket_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: helpdesk_user
    password: helpdesk_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      # Schema evolution is owned by Flyway (src/main/resources/db/migration).
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8003
  servlet:
    context-path: /

jwt:
  secret: enterprise-helpdesk-jwt-signing-key-please-replace-in-production-2026-256bit-strong
  header: Authorization
  prefix: "Bearer "
  expiration: 900000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method

helpdesk:
  user-service:
    base-url: ${HELPDESK_USER_SERVICE_BASE_URL:http://localhost:8002}
  asset-service:
    base-url: ${HELPDESK_ASSET_SERVICE_BASE_URL:http://localhost:8004}
  notification-service:
    base-url: ${HELPDESK_NOTIFICATION_SERVICE_BASE_URL:http://localhost:8005}
  storage:
    # Local disk path for ticket attachments. Backed by a Docker volume.
    attachments-path: ${HELPDESK_ATTACHMENTS_PATH:/var/helpdesk/attachments}
  internal-api:
    secret: ${INTERNAL_API_SECRET:dev-internal-sync-secret-change-in-prod}

logging:
  level:
    root: INFO
    com.helpdesk: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
