spring:
  application:
    name: auth-service

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:mysql://mysql:3306/auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: helpdesk_user
    password: helpdesk_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8001
  servlet:
    context-path: /

jwt:
  secret: enterprise-helpdesk-jwt-signing-key-please-replace-in-production-2026-256bit-strong
  header: Authorization
  prefix: "Bearer "
  expiration: 900000          # 15 minutes (access token)
  refresh-expiration: 604800000 # 7 days (refresh token)

helpdesk:
  # Shared with user-service for POST /api/auth/internal/account-sync (block/unblock sync).
  internal-api:
    secret: ${INTERNAL_API_SECRET:dev-internal-sync-secret-change-in-prod}

  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8002}

  # Single bootstrap administrator (created only when no ADMIN exists in auth_db).
  # Override password in production via BOOTSTRAP_ADMIN_PASSWORD or helpdesk.bootstrap-admin.password.
  bootstrap-admin:
    enabled: true
    email: ${BOOTSTRAP_ADMIN_EMAIL:niralpatel988@gmail.com}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:niral2000}
    first-name: System
    last-name: Administrator
    department: IT

logging:
  level:
    root: INFO
    com.helpdesk: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs
